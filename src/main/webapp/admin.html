<script>
document.addEventListener('DOMContentLoaded', function() {
    // ============================================================
    // SESSION
    // ============================================================
    const contact = sessionStorage.getItem('current_contact');
    if (!contact) { window.location.href = 'login.html'; }

    // ============================================================
    // GLOBAL VARIABLES
    // ============================================================
    let currentSection = 'set-pricing';
    let currentPricing = { washPrice: 50, dryPrice: 30, ironPrice: 25, foldPrice: 20 };
    let isNavigating = false;
    let isLoading = false;
    let refreshInterval = null;
    let failedAttempts = 0;

    // ============================================================
    // DOM REFS
    // ============================================================
    const adminNameDisplay = document.getElementById('adminNameDisplay');
    const logoutBtn = document.getElementById('logoutBtn');
    const adminNotification = document.getElementById('adminNotification');
    const setPriceTableBody = document.getElementById('setPriceTableBody');
    const pendingTableBody = document.getElementById('pendingTableBody');
    const toWashTableBody = document.getElementById('toWashTableBody');
    const toDryTableBody = document.getElementById('toDryTableBody');
    const toIronTableBody = document.getElementById('toIronTableBody');
    const toFoldTableBody = document.getElementById('toFoldTableBody');
    const forPickupTableBody = document.getElementById('forPickupTableBody');
    const toDeliverTableBody = document.getElementById('toDeliverTableBody');
    const claimedTableBody = document.getElementById('claimedTableBody');
    const laundryLogsTableBody = document.getElementById('laundryLogsTableBody');
    const priceWash = document.getElementById('priceWash');
    const priceDry = document.getElementById('priceDry');
    const priceIron = document.getElementById('priceIron');
    const priceFold = document.getElementById('priceFold');
    const updatePricingBtn = document.getElementById('updatePricingBtn');
    const popupWeight = document.getElementById('popupWeight');
    const popupPrice = document.getElementById('popupPrice');
    const popupPriceDisplay = document.getElementById('popupPriceDisplay');
    const popupPricingInfo = document.getElementById('popupPricingInfo');
    const popupCancelBtn = document.getElementById('popupCancelBtn');
    const popupConfirmBtn = document.getElementById('popupConfirmBtn');
    const popupOverlay = document.getElementById('popupOverlay');
    const confirmDialog = document.getElementById('confirmDialog');
    const confirmMessage = document.getElementById('confirmMessage');
    const confirmCancel = document.getElementById('confirmCancel');
    const confirmOk = document.getElementById('confirmOk');
    const mainMenu = document.querySelector('.main-menu');
    const footerNote = document.querySelector('.footer-note');

    // ============================================================
    // BACK TO MENU
    // ============================================================
    window.goBackToMenu = function() {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        if (mainMenu) mainMenu.style.display = 'flex';
    };

    // ============================================================
    // ADMIN NAME
    // ============================================================
    async function setAdminName() {
        try {
            const response = await fetch('/api/auth/customer/by-contact/' + contact);
            const data = await response.json();
            if (data.success && adminNameDisplay) {
                adminNameDisplay.textContent = data.customer.firstName + ' ' + data.customer.lastName;
            }
        } catch (error) {
            console.error('Error loading admin name:', error);
        }
    }
    setAdminName();

    // ============================================================
    // LOGOUT
    // ============================================================
    if (logoutBtn) {
        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (confirm('Logout from admin?')) {
                sessionStorage.removeItem('current_customer_id');
                sessionStorage.removeItem('current_user_role');
                sessionStorage.removeItem('current_contact');
                window.location.href = 'index.html';
            }
        });
    }

    // ============================================================
    // NOTIFICATION
    // ============================================================
    function showNotification(message, type = 'success') {
        if (!adminNotification) {
            console.log('Notification element not found. Message:', message);
            alert(message);
            return;
        }
        adminNotification.className = 'notification show ' + type;
        adminNotification.innerHTML = '<i class="fas fa-' + (type === 'success' ? 'check-circle' : 'exclamation-circle') + '"></i> ' + message;
        setTimeout(() => { adminNotification.className = 'notification'; }, 5000);
    }

    // ============================================================
    // GET LAST PROCESS FROM SERVICES
    // ============================================================
    function getLastProcessFromServices(services) {
        const serviceList = services.split(',').map(s => s.trim());
        const order = ['Wash', 'Dry', 'Iron', 'Fold'];
        let last = 'Fold';
        for (let s of order) {
            if (serviceList.includes(s)) {
                last = s;
            }
        }
        return last.toLowerCase();
    }

    // ============================================================
    // LOAD TABLE - FIXED WITH ERROR HANDLING
    // ============================================================
    async function loadTable(section, tbodyId, isSetPrice) {
        if (isLoading) return;
        isLoading = true;
        
        const tbody = document.getElementById(tbodyId);
        if (!tbody) {
            isLoading = false;
            return;
        }
        try {
            if (!navigator.onLine) {
                throw new Error('No internet connection');
            }
            
            let url = '/api/admin/' + section;
            if (section === 'set-pricing') {
                url = '/api/admin/set-pricing';
            }
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);
            
            const response = await fetch(url, { signal: controller.signal });
            clearTimeout(timeoutId);
            
            if (!response.ok) {
                throw new Error('HTTP ' + response.status);
            }
            
            const data = await response.json();
            failedAttempts = 0;
            
            if (data.success && data.orders && data.orders.length > 0) {
                let html = '';
                const grouped = {};
                data.orders.forEach(o => {
                    if (!grouped[o.customerId]) {
                        grouped[o.customerId] = [];
                    }
                    grouped[o.customerId].push(o);
                });
                
                Object.keys(grouped).forEach(key => {
                    grouped[key].sort((a, b) => a.queueNumber - b.queueNumber);
                });
                
                const sortedCustomerIds = Object.keys(grouped).sort((a, b) => a - b);
                
                sortedCustomerIds.forEach(custId => {
                    const orders = grouped[custId];
                    orders.forEach((o, index) => {
                        const services = o.services || 'N/A';
                        const type = o.serviceType === 'pickup' ? 'Pick-up' : 'Deliver';
                        const weight = o.weight > 0 ? o.weight + ' kg' : '--';
                        const price = o.price > 0 ? '₱' + o.price : '--';
                        const createdAt = o.createdAt || o.created_at || new Date().toISOString();
                        
                        if (section === 'laundry_logs') {
                            const statusLabel = o.status.charAt(0).toUpperCase() + o.status.slice(1);
                            if (index === 0) {
                                html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${weight}</td><td>${price}</td><td>${statusLabel}</td></tr>`;
                            } else {
                                html += `<tr><td>${services}</td><td>${weight}</td><td>${price}</td><td>${statusLabel}</td></tr>`;
                            }
                        } else if (section === 'claimed') {
                            if (index === 0) {
                                html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td>${weight}</td><td>${price}</td></tr>`;
                            } else {
                                html += `<tr><td>${services}</td><td>${type}</td><td>${weight}</td><td>${price}</td></tr>`;
                            }
                        } else if (isSetPrice) {
                            // FIXED: Pass customerId, services, createdAt
                            let buttons = `<button class="action-btn" onclick="window.setPriceOrder('${custId}', '${services}', '${createdAt}', ${o.weight || 0}, ${o.price || 0})">Set Price</button>`;
                            if (index === 0) {
                                html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td>${buttons}</td></tr>`;
                            } else {
                                html += `<tr><td>${services}</td><td>${type}</td><td>${buttons}</td></tr>`;
                            }
                        } else if (section === 'to_deliver') {
                            if (index === 0) {
                                const address = o.customerAddress || 'N/A';
                                // FIXED: Pass customerId, services, createdAt
                                let actionBtn = `<button class="action-btn claim-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', 'claimed')">Claim</button>`;
                                html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td rowspan="${orders.length}">${address}</td><td>${weight}</td><td>${price}</td><td>${actionBtn}</td></tr>`;
                            } else {
                                html += `<tr><td>${services}</td><td>${type}</td><td>${weight}</td><td>${price}</td><td><button class="action-btn claim-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', 'claimed')">Claim</button></td></tr>`;
                            }
                        } else if (section === 'for_pickup') {
                            if (index === 0) {
                                // FIXED: Pass customerId, services, createdAt
                                html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td>${weight}</td><td>${price}</td><td><button class="action-btn claim-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', 'claimed_from_pickup')">Claim</button></td></tr>`;
                            } else {
                                html += `<tr><td>${services}</td><td>${type}</td><td>${weight}</td><td>${price}</td><td><button class="action-btn claim-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', 'claimed_from_pickup')">Claim</button></td></tr>`;
                            }
                        } else {
                            const nextTable = o.serviceType === 'deliver' ? 'to_deliver' : 'for_pickup';
                            
                            let action = '', actionLabel = '';
                            if (section === 'pending') {
                                if (services.includes('Wash')) { action = 'to_wash'; actionLabel = 'To Wash'; }
                                else if (services.includes('Dry')) { action = 'to_dry'; actionLabel = 'To Dry'; }
                                else if (services.includes('Iron')) { action = 'to_iron'; actionLabel = 'To Iron'; }
                                else if (services.includes('Fold')) { action = 'to_fold'; actionLabel = 'To Fold'; }
                                else { action = 'to_wash'; actionLabel = 'To Wash'; }
                                // FIXED: Pass customerId, services, createdAt
                                if (index === 0) {
                                    html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td>${weight}</td><td>${price}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${action}')">${actionLabel}</button></td></tr>`;
                                } else {
                                    html += `<tr><td>${services}</td><td>${type}</td><td>${weight}</td><td>${price}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${action}')">${actionLabel}</button></td></tr>`;
                                }
                            } else if (section === 'to_wash') {
                                const next = services.includes('Dry') ? 'to_dry' : services.includes('Iron') ? 'to_iron' : services.includes('Fold') ? 'to_fold' : nextTable;
                                const label = next === 'to_dry' ? 'To Dry' : next === 'to_iron' ? 'To Iron' : next === 'to_fold' ? 'To Fold' : (next === 'to_deliver' ? 'To Deliver' : 'For Pickup');
                                // FIXED: Pass customerId, services, createdAt
                                if (index === 0) {
                                    html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td>${weight}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${next}')">${label}</button></td></tr>`;
                                } else {
                                    html += `<tr><td>${services}</td><td>${type}</td><td>${weight}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${next}')">${label}</button></td></tr>`;
                                }
                            } else if (section === 'to_dry') {
                                const next = services.includes('Iron') ? 'to_iron' : services.includes('Fold') ? 'to_fold' : nextTable;
                                const label = next === 'to_iron' ? 'To Iron' : next === 'to_fold' ? 'To Fold' : (next === 'to_deliver' ? 'To Deliver' : 'For Pickup');
                                // FIXED: Pass customerId, services, createdAt
                                if (index === 0) {
                                    html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td>${weight}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${next}')">${label}</button></td></tr>`;
                                } else {
                                    html += `<tr><td>${services}</td><td>${type}</td><td>${weight}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${next}')">${label}</button></td></tr>`;
                                }
                            } else if (section === 'to_iron') {
                                const next = services.includes('Fold') ? 'to_fold' : nextTable;
                                const label = next === 'to_fold' ? 'To Fold' : (next === 'to_deliver' ? 'To Deliver' : 'For Pickup');
                                // FIXED: Pass customerId, services, createdAt
                                if (index === 0) {
                                    html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td>${weight}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${next}')">${label}</button></td></tr>`;
                                } else {
                                    html += `<tr><td>${services}</td><td>${type}</td><td>${weight}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${next}')">${label}</button></td></tr>`;
                                }
                            } else if (section === 'to_fold') {
                                const next = nextTable;
                                const label = next === 'to_deliver' ? 'To Deliver' : 'For Pickup';
                                // FIXED: Pass customerId, services, createdAt
                                if (index === 0) {
                                    html += `<tr><td rowspan="${orders.length}">${custId}</td><td rowspan="${orders.length}">${o.customerName}</td><td>${services}</td><td>${type}</td><td>${weight}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${next}')">${label}</button></td></tr>`;
                                } else {
                                    html += `<tr><td>${services}</td><td>${type}</td><td>${weight}</td><td><button class="action-btn" onclick="window.moveOrderAction('${custId}', '${services}', '${createdAt}', '${next}')">${label}</button></td></tr>`;
                                }
                            }
                        }
                    });
                });
                tbody.innerHTML = html;
            } else {
                const cols = section === 'laundry_logs' ? 6 : section === 'claimed' ? 6 : section === 'to_deliver' ? 8 : (section === 'pending' || section === 'for_pickup') ? 7 : 6;
                tbody.innerHTML = `<tr><td colspan="${cols}" style="text-align:center;color:#6f8fa2;">No orders found</td></tr>`;
            }
        } catch (error) {
            console.warn('Error loading table:', error.message);
            failedAttempts++;
            if (failedAttempts > 5) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#e53935;">⚠️ Connection error. Check backend.</td></tr>';
            }
        }
        isLoading = false;
    }

    // ============================================================
    // LOAD TABLE FOR SECTION
    // ============================================================
    function loadTableForSection(section) {
        const tableMap = {
            'laundry_logs': { tbody: 'laundryLogsTableBody', isSetPrice: false },
            'set-pricing': { tbody: 'setPriceTableBody', isSetPrice: true },
            'pending': { tbody: 'pendingTableBody', isSetPrice: false },
            'to_wash': { tbody: 'toWashTableBody', isSetPrice: false },
            'to_dry': { tbody: 'toDryTableBody', isSetPrice: false },
            'to_iron': { tbody: 'toIronTableBody', isSetPrice: false },
            'to_fold': { tbody: 'toFoldTableBody', isSetPrice: false },
            'for_pickup': { tbody: 'forPickupTableBody', isSetPrice: false },
            'to_deliver': { tbody: 'toDeliverTableBody', isSetPrice: false },
            'claimed': { tbody: 'claimedTableBody', isSetPrice: false }
        };
        
        const config = tableMap[section];
        if (config) {
            loadTable(section, config.tbody, config.isSetPrice);
        }
    }

    // ============================================================
    // POPUP - SET PRICE (FIXED)
    // ============================================================
    let popupCustomerId = null;
    let popupServices = '';
    let popupTimestamp = '';
    let isPopupProcessing = false;

    function updatePriceDisplay() {
        const weight = parseFloat(popupWeight.value) || 0;
        const price = computePrice(weight, popupServices, currentPricing);
        popupPrice.value = price;
        popupPriceDisplay.textContent = '₱ ' + price.toFixed(2);
    }

    function computePrice(weight, services, pricing) {
        let totalServicePrice = 0;
        const serviceList = services.split(',').map(s => s.trim());
        if (serviceList.includes('Wash')) totalServicePrice += pricing.washPrice;
        if (serviceList.includes('Dry')) totalServicePrice += pricing.dryPrice;
        if (serviceList.includes('Iron')) totalServicePrice += pricing.ironPrice;
        if (serviceList.includes('Fold')) totalServicePrice += pricing.foldPrice;
        return weight * totalServicePrice;
    }

    // FIXED: Accept customerId, services, timestamp
    window.setPriceOrder = function(customerId, services, timestamp, weight, price) {
        popupCustomerId = customerId;
        popupServices = services;
        popupTimestamp = timestamp;
        
        popupWeight.value = weight || '';
        popupPrice.value = price || 0;
        updatePriceDisplay();
        
        let info = 'Pricing: Wash ₱' + currentPricing.washPrice + ' | Dry ₱' + currentPricing.dryPrice + 
                   ' | Iron ₱' + currentPricing.ironPrice + ' | Fold ₱' + currentPricing.foldPrice;
        popupPricingInfo.textContent = info;
        popupOverlay.classList.add('show');
    };

    if (popupWeight) {
        popupWeight.addEventListener('input', updatePriceDisplay);
    }

    if (popupCancelBtn) {
        popupCancelBtn.addEventListener('click', function() {
            popupOverlay.classList.remove('show');
            popupCustomerId = null;
            isPopupProcessing = false;
        });
    }

    // FIXED: Send customerId, services, timestamp
    if (popupConfirmBtn) {
        popupConfirmBtn.addEventListener('click', async function() {
            if (isPopupProcessing) return;
            if (!popupCustomerId) return;
            
            isPopupProcessing = true;
            const weight = parseFloat(popupWeight.value);
            const price = parseFloat(popupPrice.value);
            
            if (isNaN(weight) || weight <= 0) { 
                alert('Please enter a valid weight.'); 
                isPopupProcessing = false;
                return; 
            }
            if (isNaN(price) || price <= 0) { 
                alert('Price computation failed.'); 
                isPopupProcessing = false;
                return; 
            }

            try {
                const updateResponse = await fetch('/api/admin/update-weight-price', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        customerId: popupCustomerId,
                        services: popupServices,
                        timestamp: popupTimestamp,
                        weight, 
                        price 
                    })
                });
                const updateData = await updateResponse.json();
                
                if (updateData.success) {
                    const moveResponse = await fetch('/api/admin/move', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            customerId: popupCustomerId,
                            services: popupServices,
                            timestamp: popupTimestamp,
                            action: 'to_pending' 
                        })
                    });
                    const moveData = await moveResponse.json();
                    
                    if (moveData.success) {
                        popupOverlay.classList.remove('show');
                        popupCustomerId = null;
                        isPopupProcessing = false;
                        loadTable('set-pricing', 'setPriceTableBody', true);
                        showNotification('Weight, price set and moved to Pending!', 'success');
                    } else {
                        alert('Failed to move to Pending: ' + moveData.message);
                        isPopupProcessing = false;
                    }
                } else {
                    alert('Failed to update weight/price: ' + updateData.message);
                    isPopupProcessing = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Network error. Please try again.');
                isPopupProcessing = false;
            }
        });
    }

    // ============================================================
    // CONFIRM DIALOG (FIXED)
    // ============================================================
    let pendingAction = null;
    let isConfirming = false;

    // FIXED: Accept customerId, services, timestamp
    window.showConfirmDialog = function(customerId, services, timestamp, action, message) {
        if (isConfirming) return;
        pendingAction = { customerId, services, timestamp, action };
        confirmMessage.textContent = message;
        confirmDialog.classList.add('show');
    };

    if (confirmCancel) {
        confirmCancel.addEventListener('click', function() {
            confirmDialog.classList.remove('show');
            pendingAction = null;
            isConfirming = false;
        });
    }

    // FIXED: Use customerId, services, timestamp
    if (confirmOk) {
        confirmOk.addEventListener('click', async function() {
            if (isConfirming) return;
            if (!pendingAction) return;
            
            isConfirming = true;
            const { customerId, services, timestamp, action } = pendingAction;
            await moveOrder(customerId, services, timestamp, action);
            confirmDialog.classList.remove('show');
            pendingAction = null;
            setTimeout(() => { isConfirming = false; }, 500);
        });
    }

    if (confirmDialog) {
        confirmDialog.addEventListener('click', function(e) {
            if (e.target === this) { 
                confirmDialog.classList.remove('show');
                pendingAction = null;
                isConfirming = false;
            }
        });
    }

    // ============================================================
    // MOVE ORDER (FIXED)
    // ============================================================
    // FIXED: Accept customerId, services, timestamp, action
    window.moveOrderAction = function(customerId, services, timestamp, action) {
        const messages = {
            'to_wash': 'Move this order to Wash?',
            'to_dry': 'Move this order to Dry?',
            'to_iron': 'Move this order to Iron?',
            'to_fold': 'Move this order to Fold?',
            'for_pickup': 'Move this order to For Pickup?',
            'to_deliver': 'Move this order to To Deliver?',
            'claimed': 'Mark this order as Claimed?',
            'claimed_from_pickup': 'Mark this order as Claimed?'
        };
        window.showConfirmDialog(customerId, services, timestamp, action, messages[action] || 'Move this order?');
    };

    // FIXED: Send customerId, services, timestamp, action
    async function moveOrder(customerId, services, timestamp, action) {
        try {
            const response = await fetch('/api/admin/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    customerId: customerId,
                    services: services,
                    timestamp: timestamp,
                    action: action 
                })
            });
            const data = await response.json();
            if (data.success) {
                loadTableForSection(currentSection);
                showNotification('Order moved successfully!', 'success');
                return true;
            } else {
                showNotification(data.message || 'Failed to move order', 'error');
                return false;
            }
        } catch (error) {
            console.error('Error moving order:', error);
            showNotification('Network error. Please try again.', 'error');
            return false;
        }
    }

    // ============================================================
    // LOAD PRICING
    // ============================================================
    async function loadPricing() {
        try {
            const response = await fetch('/api/admin/pricing');
            const data = await response.json();
            if (data.success && data.pricing) {
                priceWash.value = data.pricing.washPrice || 50;
                priceDry.value = data.pricing.dryPrice || 30;
                priceIron.value = data.pricing.ironPrice || 25;
                priceFold.value = data.pricing.foldPrice || 20;
                currentPricing = data.pricing;
                return data.pricing;
            }
        } catch (error) { console.error('Error loading pricing:', error); }
        return { washPrice: 50, dryPrice: 30, ironPrice: 25, foldPrice: 20 };
    }

    // ============================================================
    // UPDATE PRICING
    // ============================================================
    if (updatePricingBtn) {
        updatePricingBtn.addEventListener('click', async function() {
            const wash = parseFloat(priceWash.value);
            const dry = parseFloat(priceDry.value);
            const iron = parseFloat(priceIron.value);
            const fold = parseFloat(priceFold.value);
            if (isNaN(wash) || isNaN(dry) || isNaN(iron) || isNaN(fold) || wash < 0 || dry < 0 || iron < 0 || fold < 0) {
                showNotification('Please enter valid numbers.', 'error'); return;
            }
            try {
                const response = await fetch('/api/admin/pricing', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: 1, washPrice: wash, dryPrice: dry, ironPrice: iron, foldPrice: fold })
                });
                const data = await response.json();
                if (data.success) { showNotification('Pricing updated successfully!', 'success'); } 
                else { showNotification(data.message || 'Update failed', 'error'); }
            } catch (error) { showNotification('Network error. Please try again.', 'error'); }
        });
    }

    // ============================================================
    // MENU NAVIGATION
    // ============================================================
    document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            if (isNavigating) return;
            isNavigating = true;
            
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const sectionId = 'section-' + this.dataset.section;
            const section = document.getElementById(sectionId);
            if (section) {
                section.classList.add('active');
                if (mainMenu) mainMenu.style.display = 'none';
                
                currentSection = this.dataset.section;
                loadTableForSection(currentSection);
            }
            
            setTimeout(() => { isNavigating = false; }, 300);
        });
    });

    // ============================================================
    // START AUTO REFRESH (5 seconds instead of 1)
    // ============================================================
    function startAutoRefresh() {
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(() => {
            if (document.querySelector('.section.active')) {
                loadTableForSection(currentSection);
            }
        }, 5000);
    }

    // ============================================================
    // BACK TO MENU (footer click)
    // ============================================================
    if (footerNote) {
        footerNote.addEventListener('click', function() {
            window.goBackToMenu();
        });
    }

    // ============================================================
    // ONLINE/OFFLINE EVENTS
    // ============================================================
    window.addEventListener('online', function() {
        showNotification('Back online! Refreshing...', 'success');
        loadTableForSection(currentSection);
    });

    window.addEventListener('offline', function() {
        showNotification('You are offline. Please check your connection.', 'error');
    });

    // ============================================================
    // INIT
    // ============================================================
    (async function init() {
        console.log('🚀 Admin initializing...');
        await loadPricing();
        await loadTable('set-pricing', 'setPriceTableBody', true);
        console.log('✅ Admin ready, table loaded.');
        startAutoRefresh();
    })();

});
</script>
